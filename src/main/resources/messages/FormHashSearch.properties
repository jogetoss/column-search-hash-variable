org.joget.FormHashPlugin.FormHashSearch.pluginLabel=Form Column Search Hash Variable
org.joget.FormHashPlugin.FormHashSearch.pluginDesc=Form Lookup Hash Variable Plugin. Retrieve a column value from a form table with specific search criteria.
assist.FormLookup.example=Condition example: \"name=Cat,approver=Clark\"
assist.FormLookup.hashWithQuery=Display the first row's field value from form data table with any field to lookup. e.g. #formLookup.request.status[applicant=Cat Grant]# : Approved
assist.FormLookupMultirow.hashWithQuery=Display multi rows' field value in definable separator value and index from form data table name with any field to lookup. e.g. #formLookupMultirow.request.status[applicant=Cat Grant][, ]# : Approved, Pending, Rejected
assist.FormLookupMultirow.separatorExample=Separator example: \", "
assist.FormLookupMultirow.indexExample=Index example: \"0"